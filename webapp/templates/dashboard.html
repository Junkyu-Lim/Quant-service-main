<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Quant Dashboard (5-Strategy)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .val-pos { color: #d63384; font-weight: 600; }
    .val-neg { color: #0d6efd; font-weight: 600; }
    .nav-tabs .nav-link.active { font-weight: bold; border-bottom: 3px solid #0d6efd; }
    th { font-size: 0.85rem; background-color: #f8f9fa; position: sticky; top: 0; z-index: 2; }
    td { font-size: 0.9rem; vertical-align: middle; }
    .metric-pill { display: inline-block; padding: 4px 8px; margin: 2px; border-radius: 12px; background: #f1f3f5; font-size: 0.8rem; text-align: center; min-width: 80px; cursor: help; }
    .metric-pill .lbl { color: #6c757d; font-size: 0.7rem; }
    .metric-pill .val { font-weight: bold; color: #212529; }
    .metric-pill:hover { background: rgba(13,110,253,0.1); }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Quant Dashboard</a>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-light" id="btn-refresh">Refresh</button>
      <button class="btn btn-sm btn-primary" id="btn-trigger">Run Pipeline</button>
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row mb-3" id="market-summary">
    <!-- Market Summary Cards (JS로 렌더링) -->
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body py-2">
      <ul class="nav nav-tabs nav-fill" id="screen-tabs">
        <li class="nav-item"><a class="nav-link active" href="#" data-screen="all">전체 종목</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="leaders">시장 주도주</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="quality_value">우량가치</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="growth_mom">고성장 모멘텀</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="cash_div">현금배당</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="turnaround">턴어라운드</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="multi_strategy">Multi-Pick</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-screen="watchlist">관심종목 <span id="cnt-watchlist" class="badge bg-warning text-dark rounded-pill">0</span></a></li>
      </ul>
      <div class="mt-2 p-2 bg-light rounded small d-flex justify-content-between align-items-center">
        <div id="strategy-desc"></div>
        <button class="btn btn-sm btn-outline-primary bg-white" id="btn-strategy-guide">💡 분석 가이드</button>
      </div>
    </div>
  </div>

  <!-- 배치 변경 배너 -->
  <div id="change-banner-container" style="display:none;" class="mb-2"></div>

  <div class="card shadow-sm">
    <div class="card-header bg-white py-2">
      <div class="d-flex justify-content-between align-items-center">
        <form id="filter-form" class="d-flex gap-2 align-items-center flex-wrap">
          <select class="form-select form-select-sm" id="f-market" style="width:100px;">
            <option value="">All Mkt</option>
            <option value="KOSPI">KOSPI</option>
            <option value="KOSDAQ">KOSDAQ</option>
          </select>
          <input type="text" class="form-control form-control-sm" id="f-search" placeholder="종목명/코드" style="width:150px;">
          <select class="form-select form-select-sm" id="f-pagesize" style="width:70px;">
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
          <button type="submit" class="btn btn-sm btn-secondary">검색</button>
          <button type="button" class="btn btn-sm btn-outline-secondary" id="btn-clear">초기화</button>
          <button type="button" class="btn btn-sm btn-outline-info" id="btn-adv-toggle">Advanced ▼</button>
        </form>
        <div id="page-info" class="small text-muted"></div>
      </div>
    </div>

    <!-- Advanced Filter 패널 -->
    <div id="adv-filter-panel" style="display:none;">
      <div class="adv-filter-toolbar">
        <div class="adv-cat-tabs" id="adv-cat-tabs"></div>
        <div class="adv-filter-toolbar-right">
          <input type="text" class="form-control form-control-sm adv-search-input" id="adv-search" placeholder="지표 검색...">
          <span class="badge bg-primary adv-active-badge" id="adv-active-count" style="display:none;">0</span>
          <button class="btn btn-sm btn-outline-secondary" id="btn-adv-reset">초기화</button>
        </div>
      </div>
      <div id="column-filters">
        <div class="adv-filter-grid" id="adv-filter-grid"></div>
      </div>
    </div>

    <!-- Compare 바 -->
    <div class="compare-bar" id="compare-bar" style="display:none;">
      <span id="compare-count">0개 선택됨</span>
      <button class="btn btn-sm btn-info ms-2" id="btn-compare">비교하기</button>
      <button class="btn btn-sm btn-outline-secondary ms-1" id="btn-compare-clear">선택 해제</button>
    </div>

    <div class="card-body p-0 table-responsive">
      <table class="table table-hover table-striped mb-0 text-center" id="stock-table" style="min-width: 1000px;">
        <thead id="table-header"></thead>
        <tbody id="stock-tbody"></tbody>
      </table>
    </div>
    <div class="card-footer bg-white d-flex justify-content-between py-2">
      <button class="btn btn-sm btn-outline-secondary" id="btn-prev">Prev</button>
      <button class="btn btn-sm btn-outline-secondary" id="btn-next">Next</button>
    </div>
  </div>
</div>

<!-- ─── Detail Modal ─── -->
<div class="modal fade" id="detail-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h5 class="modal-title" id="detail-title">Stock Detail</h5>
        <div>
          <button class="btn btn-sm btn-outline-warning me-2" id="btn-watch-detail">관심종목</button>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
      </div>
      <div class="modal-body">
        <div class="metric-grid mb-3" id="detail-metrics"></div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <button class="btn btn-outline-success w-100" id="btn-analysis-gemini">🔍 Gemini 분석 (무료)</button>
          </div>
          <div class="col-6">
            <button class="btn w-100" id="btn-analysis-claude" style="border-color:#6f42c1; color:#6f42c1;">🤖 Claude 분석 (프리미엄)</button>
          </div>
        </div>

        <div class="card mb-3" id="financial-chart-area" style="display:none;">
          <div class="card-body" style="height: 250px;">
            <canvas id="financial-chart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Strategy Guide Modal ─── -->
<div class="modal fade" id="guide-modal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-light">
        <h5 class="modal-title" id="guide-title">💡 전략 분석 가이드</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="guide-content"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Report Modal ─── -->
<div class="modal fade" id="report-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="report-title">AI Analysis Report</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body position-relative">
        <div id="report-loading" class="text-center py-5" style="display:none;">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted" id="report-loading-text">분석 보고서를 생성하고 있습니다...</p>
        </div>
        <div id="report-content" class="px-2"></div>
      </div>
      <div class="modal-footer d-flex justify-content-between">
        <span class="text-muted small" id="report-meta"></span>
        <div>
          <button class="btn btn-secondary btn-sm" id="btn-regenerate">재생성</button>
          <button class="btn btn-primary btn-sm" id="btn-pdf">인쇄/PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Pipeline Progress Modal ─── -->
<div class="modal fade" id="pipeline-progress-modal" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <h5 class="mb-3">Data Pipeline Running...</h5>
        <div class="progress mb-2" style="height: 20px;">
          <div id="pipeline-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>
        <div class="d-flex justify-content-between small text-muted">
          <span id="pipeline-stage">Starting...</span>
          <span id="pipeline-pct">0%</span>
        </div>
        <div class="mt-2 small text-secondary">Elapsed: <span id="pipeline-elapsed">0s</span></div>
        <div id="pipeline-error" class="alert alert-danger mt-3 small" style="display:none;"></div>
      </div>
      <div class="modal-footer justify-content-center" id="pipeline-footer" style="display:none;">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Compare Modal ─── -->
<div class="modal fade" id="compare-modal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">종목 비교</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav mb-3" id="compare-category-tabs"></ul>
        <div id="compare-table-container"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/dashboard.js?v=2"></script>
</body>
</html>
